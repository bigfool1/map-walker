services:
  map-walker:
    image: map-walker:latest
    build: .
    environment:
      DB_DRIVER: mysql
      DB_DSN: ${DB_DSN:-mapwalker:changeme@tcp(mysql:3306)/mapwalkerdb}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    restart: unless-stopped

  tester:
    image: map-walker-tester:latest
    build:
      context: .
      target: tester
    environment:
      DB_DRIVER: mysql
      DB_DSN: ${DB_DSN:-mapwalker:changeme@tcp(mysql:3306)/mapwalkerdb}
      MAP_WALKER_SYNTHETIC_PASSWORD: ${MAP_WALKER_SYNTHETIC_PASSWORD:-localtestpwd}
    depends_on:
      mysql:
        condition: service_healthy
      map-walker:
        condition: service_started
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: mapwalkerdb
      MYSQL_USER: mapwalker
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
